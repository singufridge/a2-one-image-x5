<!DOCTYPE html>
  <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page Title Goes Here</title>
        <link rel="stylesheet" href="style.css">
    </head>
  <body>
    <!-- Ideas:
    - scroll horzontally
    - translate copies of same img diagonally a bunch of times
    - give each instance of an img a frame that either gets discarded or distorted alongside it
    -->

    <div class="first-glitch">
        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" alt="Statue">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(10px, 10px);">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(20px, 20px);">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(30px, 30px);">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(40px, 40px);">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(50px, 50px);">

        <img class="glitched-img" src="./images/a2-glitch-photo.jpg" style="transform: translate(60px, 60px);">
    </div>
  </body>
</html>
